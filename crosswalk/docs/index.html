    sidebar.appendChild(el('p', { style: 'font-size:.78rem;color:var(--text-secondary);margin-bottom:10px;' },
      'Upload tool outputs to validate your score. Without evidence, your score is labeled "Self-Assessed".'));

    // Evidence state
    var evidence = { compliance: null, garak: null, pyrit: null, laaf: null, validatedEntries: {} };

    function createUploadBtn(label, toolKey, hint) {
      var wrap = el('div', { style: 'margin-bottom:8px;' });
      var fileInput = el('input', { type: 'file', accept: '.json', style: 'display:none;', 'aria-label': 'Upload ' + label + ' results' });
      var btn = el('button', { className: 'pill', style: 'width:100%;text-align:left;padding:6px 12px;font-size:.78rem;' });
      btn.textContent = '\u2B06 ' + label;
      var status = el('span', { style: 'font-size:.72rem;color:var(--text-secondary);display:block;margin-top:2px;' }, hint);

      btn.addEventListener('click', function() { fileInput.click(); });
      fileInput.addEventListener('change', function() {
        if (!fileInput.files[0]) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          try {
            var data = JSON.parse(e.target.result);
            var validation = validateUpload(toolKey, data);
            if (!validation.valid) {
              status.textContent = '\u274C Invalid \u2014 ' + validation.error;
              status.style.color = 'var(--cr)';
              btn.style.borderColor = 'var(--cr)';
              return;
            }
            evidence[toolKey] = data;
            processEvidence(toolKey, data);
            if (validation.warning) {
              status.textContent = '\u26A0\uFE0F Valid but suspicious \u2014 ' + validation.warning;
              status.style.color = '#ca8a04';
              btn.style.borderColor = '#ca8a04';
            } else {
              status.textContent = '\u2705 Valid \u2014 ' + validation.summary;
              status.style.color = 'var(--lo)';
              btn.style.borderColor = 'var(--lo)';
            }
            updateScore();
          } catch (err) {
            status.textContent = '\u274C Invalid JSON: ' + err.message;
            status.style.color = 'var(--cr)';
          }
        };
        reader.readAsText(fileInput.files[0]);
      });

      wrap.appendChild(fileInput);
      wrap.appendChild(btn);
      wrap.appendChild(status);
      return wrap;
    }

    sidebar.appendChild(createUploadBtn('Compliance Report', 'compliance',
      'From: node scripts/compliance-report.js --format json'));
    sidebar.appendChild(createUploadBtn('Garak Results', 'garak',
      'From: garak --report_prefix results'));
    sidebar.appendChild(createUploadBtn('PyRIT Results', 'pyrit',
      'From: PyRIT JSON output'));
    sidebar.appendChild(createUploadBtn('LAAF Results', 'laaf',
      'From: python evals/laaf/laaf_crosswalk.py --format json'));

    sidebar.appendChild(el('p', { style: 'font-size:.72rem;color:var(--text-muted);margin-top:12px;line-height:1.5;' },
      'Tool-Verified = schema + fingerprint checks passed. For independent attestation (highest trust), submit results via GitHub Issue for maintainer review.'));

    function processEvidence(toolKey, data) {
      // Map tool outputs to validated OWASP entries
      if (toolKey === 'compliance') {
        // compliance-report.js --format json produces framework reports
        // Mark all entries that appear in the report as compliance-validated
        if (data.framework && data.entries) {
          data.entries.forEach(function(e) {
            if (!evidence.validatedEntries[e.id]) evidence.validatedEntries[e.id] = {};
            evidence.validatedEntries[e.id].compliance = {
              framework: data.framework,
              controls: e.controls ? e.controls.length : 0,
              status: 'validated'
            };
          });
        }
        // Also handle array of frameworks
        if (Array.isArray(data)) {
          data.forEach(function(fw) {
            if (fw.entries) fw.entries.forEach(function(e) {
              if (!evidence.validatedEntries[e.id]) evidence.validatedEntries[e.id] = {};
              evidence.validatedEntries[e.id].compliance = { framework: fw.framework, status: 'validated' };
            });
          });
        }
      }
      if (toolKey === 'garak') {
        // Garak outputs eval results — map probe names to OWASP entries
        var garakMap = {
          'promptinject': 'LLM01', 'knownbadsignatures': 'LLM01', 'artprompt': 'LLM01',
          'leakreplay': 'LLM02', 'continuation': 'LLM02',
          'dan': 'LLM06', 'gcg': 'LLM01',
          'snowball': 'LLM09', 'misleading': 'LLM09',
          'lmrc': 'LLM07'
        };
        var garakValidation = validateUpload('garak', data);
        var garakWarning = garakValidation.warning || null;
        var results = data.results || data.log || data;
        if (Array.isArray(results)) {
          results.forEach(function(r) {
            var probe = (r.probe || r.test || '').toLowerCase();
            Object.keys(garakMap).forEach(function(key) {
              if (probe.includes(key)) {
                var eid = garakMap[key];
                if (!evidence.validatedEntries[eid]) evidence.validatedEntries[eid] = {};
                evidence.validatedEntries[eid].garak = {
                  probe: r.probe || probe,
                  passed: r.passed || r.status === 'pass',
                  score: r.score || null,
                  status: 'tested',
                  warning: garakWarning
                };
              }
            });
          });
        }
      }
      if (toolKey === 'laaf') {
        // LAAF crosswalk output maps stages to OWASP entries
        var laafStageMap = {
          S1: ['LLM07', 'LLM01'], S2: ['LLM01', 'ASI01', 'DSGAI04'],
          S3: ['ASI01', 'ASI06', 'LLM06'], S4: ['ASI06', 'LLM06', 'DSGAI04'],
          S5: ['LLM01', 'LLM02'], S6: ['DSGAI01', 'LLM07']
        };
        var laafValidation = validateUpload('laaf', data);
        var laafWarning = laafValidation.warning || null;
        var stages = data.stages || data.results || data;
        if (typeof stages === 'object') {
          Object.keys(stages).forEach(function(stageKey) {
            var mappedEntries = laafStageMap[stageKey] || laafStageMap[stageKey.toUpperCase()] || [];
            var stageData = stages[stageKey];
            mappedEntries.forEach(function(eid) {
              if (!evidence.validatedEntries[eid]) evidence.validatedEntries[eid] = {};
              evidence.validatedEntries[eid].laaf = {
                stage: stageKey,
                breakthrough_rate: stageData.breakthrough_rate || stageData.rate || null,
                status: 'tested',
                warning: laafWarning
              };
            });
          });
        }
      }
      if (toolKey === 'pyrit') {
        // PyRIT outputs — map to OWASP entries by attack type
        var pyritMap = { 'prompt_injection': 'LLM01', 'rag_poisoning': 'DSGAI04', 'goal_hijack': 'ASI01' };
        var attacks = data.attacks || data.results || data;
        if (Array.isArray(attacks)) {
          attacks.forEach(function(a) {
            var atype = (a.attack_type || a.type || '').toLowerCase();
            Object.keys(pyritMap).forEach(function(key) {
              if (atype.includes(key)) {
                var eid = pyritMap[key];
                if (!evidence.validatedEntries[eid]) evidence.validatedEntries[eid] = {};
                evidence.validatedEntries[eid].pyrit = { type: a.attack_type || atype, status: 'tested' };
              }
            });
          });
        }
      }
    }

    layout.appendChild(sidebar);

    // Main content
    var main = el('div', { className: 'score-main' });

    shareBtns.appendChild(downloadPngBtn);

    linkedInBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg> Share on LinkedIn';
    shareBtns.appendChild(linkedInBtn);

    shareBtns.appendChild(twitterBtn);

    shareBtns.appendChild(badgeBtn);

    var scoreCanvas = document.createElement('canvas');
    scoreCanvas.width = 1200;

    var dashboard = el('div', { id: 'score-dashboard' });

    function updateScore() {
      // Update URL
      var fwParam = Array.from(selected).join(',');
      var newHash = '#/score' + (fwParam ? '?fw=' + encodeURIComponent(fwParam) : '');
      history.replaceState(null, '', newHash);

      dashboard.innerHTML = '';

      // Calculate DEPTH coverage per entry
      // Score = what % of each entry's total controls are covered by selected frameworks
      // Weighted by severity: Critical=4, High=3, Medium=2, Low=1
      var sevWeight = { Critical: 4, High: 3, Medium: 2, Low: 1 };
      var totalWeight = 0;
      var weightedScore = 0;
      var coveredEntries = [];
      var uncoveredEntries = [];
      var entryScores = [];

      DATA.forEach(function(entry) {
        var totalControls = entry.mappings.length;
        if (totalControls === 0) { uncoveredEntries.push(entry); return; }

        var coveredControls = entry.mappings.filter(function(m) {
          return selected.has(m.framework);
        }).length;

        var entryPct = Math.round((coveredControls / totalControls) * 100);
        var weight = sevWeight[entry.severity] || 1;
        totalWeight += weight;
        weightedScore += (coveredControls / totalControls) * weight;

        entryScores.push({ entry: entry, pct: entryPct, covered: coveredControls, total: totalControls });

        if (coveredControls > 0) coveredEntries.push(entry);
        else uncoveredEntries.push(entry);
      });

      var overallPct = totalWeight > 0 ? Math.round((weightedScore / totalWeight) * 100) : 0;

      // Per source list
      var sourceLists = ['LLM-Top10-2025', 'Agentic-Top10-2026', 'DSGAI-2026'];
      var sourceStats = {};
      sourceLists.forEach(function(sl) {
        var slEntries = entryScores.filter(function(es) { return es.entry.source_list === sl; });
        var slWeight = 0;
        var slScore = 0;
        slEntries.forEach(function(es) {
          var w = sevWeight[es.entry.severity] || 1;
          slWeight += w;
          slScore += (es.covered / es.total) * w;
        });
        var total = DATA.filter(function(e) { return e.source_list === sl; }).length;
        var covered = slEntries.filter(function(es) { return es.covered > 0; }).length;
        sourceStats[sl] = { total: total, covered: covered, pct: slWeight > 0 ? Math.round((slScore / slWeight) * 100) : 0 };
      });

      // Overview cards
      var overview = el('div', { className: 'score-overview' });

      // Determine validation tier
      var evidenceCount = Object.keys(evidence.validatedEntries).length;
      var hasEvidence = evidence.compliance || evidence.garak || evidence.pyrit || evidence.laaf;
      var hasWarning = Object.values(evidence.validatedEntries).some(function(v) {
        return (v.garak && v.garak.warning) || (v.laaf && v.laaf.warning);
      });
      var validationTier, tierColor, tierIcon;
      if (hasEvidence && evidenceCount >= 20 && !hasWarning) {
        validationTier = 'Tool-Verified'; tierColor = '#16a34a'; tierIcon = '\u2705';
      } else if (hasEvidence && evidenceCount >= 20 && hasWarning) {
        validationTier = 'Tool-Verified (review flagged)'; tierColor = '#ca8a04'; tierIcon = '\u26A0\uFE0F';
      } else if (hasEvidence) {
        validationTier = 'Partially Verified'; tierColor = '#ca8a04'; tierIcon = '\u26A0\uFE0F';
      } else {
        validationTier = 'Self-Assessed'; tierColor = '#6c757d'; tierIcon = '\u2753';
      }

      var mainCard = el('div', { className: 'score-card' });
      mainCard.appendChild(el('div', { className: 'score-big ' + scoreClass(overallPct) }, overallPct + '%'));
      mainCard.appendChild(el('div', { className: 'score-label' }, 'Overall Coverage'));
      var tierBadge = el('div', {
        style: 'margin-top:6px;display:inline-block;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:600;' +
               'background:' + tierColor + '22;color:' + tierColor + ';border:1px solid ' + tierColor + '44;'
      }, tierIcon + ' ' + validationTier);
      mainCard.appendChild(tierBadge);
      mainCard.appendChild(el('div', { className: 'score-sublabel' }, selected.size + ' / ' + FRAMEWORKS.length + ' frameworks · severity-weighted'));
      overview.appendChild(mainCard);

      sourceLists.forEach(function(sl) {
        var s = sourceStats[sl];
        var card = el('div', { className: 'score-card' });
        card.appendChild(el('div', { className: 'score-big ' + scoreClass(s.pct) }, s.pct + '%'));
        card.appendChild(el('div', { className: 'score-label' }, SOURCE_LABELS[sl]));
        card.appendChild(el('div', { className: 'score-sublabel' }, s.covered + ' / ' + s.total + ' entries touched'));
        overview.appendChild(card);
      });
      dashboard.appendChild(overview);

      // Severity heatmap — Critical/High entries with < 50% coverage
      var weakEntries = entryScores.filter(function(es) {
        return (es.entry.severity === 'Critical' || es.entry.severity === 'High') && es.pct < 50;
      }).sort(function(a, b) {
        var sevOrd = { Critical: 0, High: 1 };
        if (sevOrd[a.entry.severity] !== sevOrd[b.entry.severity]) return sevOrd[a.entry.severity] - sevOrd[b.entry.severity];
        return a.pct - b.pct;
      });

      if (weakEntries.length > 0 && selected.size > 0) {
        var heatSection = el('div', { className: 'gap-section' });
        heatSection.appendChild(el('h3', { style: 'color:var(--cr);' }, 'Critical/High Entries Below 50% Coverage'));
        weakEntries.forEach(function(es) {
          var item = el('div', { className: 'gap-item', style: 'border-left:3px solid ' + sevColor(es.entry.severity) + ';cursor:pointer;' });
          item.appendChild(el('span', { className: 'gap-id badge-id ' + es.entry.severity }, es.entry.id));
          item.appendChild(el('span', { className: 'gap-name' }, es.entry.name));
          item.appendChild(el('span', { className: 'badge-sev ' + es.entry.severity }, es.pct + '% covered'));
          item.appendChild(el('span', { style: 'font-size:.75rem;color:var(--text-secondary);' }, es.covered + '/' + es.total + ' controls'));
          item.addEventListener('click', function() { openEntryModal(es.entry); });
          heatSection.appendChild(item);
        });
        dashboard.appendChild(heatSection);
      }

      // Full entry list with coverage depth (sorted by severity then coverage)
      if (selected.size > 0 && entryScores.length > 0) {
        var sortedScores = entryScores.slice().sort(function(a, b) {
          var sevOrder = { Critical: 0, High: 1, Medium: 2, Low: 3 };
          if (sevOrder[a.entry.severity] !== sevOrder[b.entry.severity])
            return (sevOrder[a.entry.severity] || 9) - (sevOrder[b.entry.severity] || 9);
          return a.pct - b.pct;
        });

        var gapSection = el('div', { className: 'gap-section' });
        gapSection.appendChild(el('h3', {}, 'All Entries — Coverage Depth'));
        gapSection.appendChild(el('p', { style: 'font-size:.85rem;color:var(--text-secondary);margin-bottom:12px;' },
          selected.size + ' of ' + FRAMEWORKS.length + ' frameworks selected — ' + overallPct + '% weighted coverage'));
        sortedScores.forEach(function(es) {
          var item = el('div', { className: 'gap-item', style: 'cursor:pointer;border-left:3px solid ' + sevColor(es.entry.severity) + ';' });
          item.appendChild(el('span', { className: 'gap-id badge-id ' + es.entry.severity }, es.entry.id));
          item.appendChild(el('span', { className: 'gap-name' }, es.entry.name));
          // Coverage bar
          var barWrap = el('div', { style: 'flex:1;max-width:120px;background:var(--bg);border-radius:4px;height:8px;overflow:hidden;' });
          var barFill = el('div', { style: 'height:100%;width:' + es.pct + '%;background:' + (es.pct >= 70 ? 'var(--lo)' : es.pct >= 40 ? 'var(--me)' : 'var(--cr)') + ';border-radius:4px;transition:width .3s;' });
          barWrap.appendChild(barFill);
          item.appendChild(barWrap);
          item.appendChild(el('span', { style: 'font-size:.8rem;font-weight:600;min-width:40px;text-align:right;color:' + (es.pct >= 70 ? 'var(--lo)' : es.pct >= 40 ? 'var(--me)' : 'var(--cr)') }, es.pct + '%'));
          // Evidence badges
          var ev = evidence.validatedEntries[es.entry.id];
          if (ev) {
            var evBadges = el('span', { style: 'display:flex;gap:2px;margin-left:4px;' });
            if (ev.compliance) evBadges.appendChild(el('span', { style: 'font-size:.6rem;background:#16a34a22;color:#16a34a;padding:1px 4px;border-radius:3px;', title: 'Compliance report validated' }, 'CR'));
            if (ev.garak) evBadges.appendChild(el('span', { style: 'font-size:.6rem;background:#2563eb22;color:#2563eb;padding:1px 4px;border-radius:3px;', title: 'Garak tested' }, 'GK'));
            if (ev.pyrit) evBadges.appendChild(el('span', { style: 'font-size:.6rem;background:#7c3aed22;color:#7c3aed;padding:1px 4px;border-radius:3px;', title: 'PyRIT tested' }, 'PR'));
            if (ev.laaf) evBadges.appendChild(el('span', { style: 'font-size:.6rem;background:#ea580c22;color:#ea580c;padding:1px 4px;border-radius:3px;', title: 'LAAF tested' }, 'LF'));
            item.appendChild(evBadges);
          }
          item.addEventListener('click', function() { openEntryModal(es.entry); });
          gapSection.appendChild(item);
        });
        dashboard.appendChild(gapSection);
      }

      // Top 5 frameworks to add
      if (uncoveredEntries.length > 0 && selected.size < FRAMEWORKS.length) {
        var fwScores = {};
        FRAMEWORKS.forEach(function(fw) {
          if (selected.has(fw)) return;
          var wouldCover = 0;
          uncoveredEntries.forEach(function(e) {
            if (e.mappings.some(function(m) { return m.framework === fw; })) wouldCover++;
          });
          if (wouldCover > 0) fwScores[fw] = wouldCover;
        });

        var ranked = Object.keys(fwScores).sort(function(a, b) { return fwScores[b] - fwScores[a]; }).slice(0, 5);

        if (ranked.length > 0) {
          var recSection = el('div', { className: 'gap-section' });
          recSection.appendChild(el('h3', {}, 'Top Frameworks to Add'));
          recSection.appendChild(el('p', { style: 'font-size:.85rem;color:var(--text-secondary);margin-bottom:12px;' }, 'Adding these frameworks would close the most coverage gaps.'));
          var recList = el('div', { className: 'rec-list' });
          ranked.forEach(function(fw, i) {
            var item = el('div', { className: 'rec-item' });
            item.appendChild(el('span', { className: 'rec-rank' }, '#' + (i + 1)));
            var infoDiv = el('div');
            infoDiv.appendChild(el('div', { className: 'rec-fw' }, fw));
            infoDiv.appendChild(el('div', { className: 'rec-covers' }, 'Would cover ' + fwScores[fw] + ' additional entries'));
            item.appendChild(infoDiv);
            recList.appendChild(item);
          });
          recSection.appendChild(recList);
          dashboard.appendChild(recSection);
        }
      }

      // If everything covered
      if (uncoveredEntries.length === 0 && selected.size > 0) {
        var successSection = el('div', { className: 'gap-section', style: 'text-align:center;padding:40px;' });
        successSection.appendChild(el('h3', { style: 'color:var(--lo);font-size:1.25rem;' }, 'Full Coverage Achieved'));
        successSection.appendChild(el('p', { style: 'color:var(--text-secondary);' }, 'All ' + DATA.length + ' entries are covered by your selected frameworks.'));
        dashboard.appendChild(successSection);
      }

      if (selected.size === 0) {
        var emptySection = el('div', { className: 'empty-state' });
        emptySection.appendChild(el('h3', {}, 'Select frameworks to begin'));
        emptySection.appendChild(el('p', {}, 'Check the frameworks you implement in the sidebar to see your coverage score.'));
        dashboard.appendChild(emptySection);
      }

      // --- Share panel logic ---
      if (selected.size > 0) {
        sharePanel.style.display = 'block';
        var fwParam = Array.from(selected).join(',');
        var shareUrl = 'https://emmanuelgjr.github.io/GenAI-Security-Crosswalk/#/score?fw=' + encodeURIComponent(fwParam);

        // Render score card on canvas
        renderScoreCanvas(scoreCanvas, {
          overallPct: overallPct,
          llmPct: sourceStats['LLM-Top10-2025'].pct,
          agenticPct: sourceStats['Agentic-Top10-2026'].pct,
          dsgaiPct: sourceStats['DSGAI-2026'].pct,
          fwCount: selected.size,
          criticalGaps: weakEntries.filter(function(e) { return e.entry.severity === 'Critical'; }).length,
          highGaps: weakEntries.filter(function(e) { return e.entry.severity === 'High'; }).length,
          shareUrl: shareUrl,
          validationTier: validationTier
        });

        // Copy link
        copyLinkBtn.onclick = function() {
          if (navigator.clipboard) {
            navigator.clipboard.writeText(shareUrl).then(function() {
              copyLinkBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!';
              setTimeout(function() {
                copyLinkBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> Copy Link';
              }, 2000);
            });
          }
        };

        // Download PNG
        downloadPngBtn.onclick = function() {
          scoreCanvas.toBlob(function(blob) {
            var a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'crosswalk-score.png';
            a.click();
          });
        };

        // LinkedIn share
        linkedInBtn.onclick = function() {
          var linkedInUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(shareUrl);
          window.open(linkedInUrl, '_blank', 'width=600,height=600');
        };

        // Twitter/X share
        twitterBtn.onclick = function() {
          var critCount = weakEntries.filter(function(e) { return e.entry.severity === 'Critical'; }).length;
          var highCount = weakEntries.filter(function(e) { return e.entry.severity === 'High'; }).length;
          var tweetText = 'Just assessed our AI security posture against the OWASP GenAI Crosswalk \u2014 scored ' + overallPct + '% across ' + selected.size + ' frameworks.\n\n' +
            critCount + ' critical gaps identified. ' + highCount + ' high-severity gaps.\n\n' +
            'Free tool:\n\n#AISecurity #OWASP #GenAI #Cybersecurity';
          var twitterUrl = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(tweetText) + '&url=' + encodeURIComponent(shareUrl);
          window.open(twitterUrl, '_blank', 'width=600,height=400');
        };

        // Get Badge
        badgeBtn.onclick = function() {
          openBadgeModal(overallPct, selected.size);
        };
      } else {
        sharePanel.style.display = 'none';
      }
    }

    updateScore();
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // Score Canvas Renderer (1200x630 card for social sharing)
  // ══════════════════════════════════════════════════════════════════════════════
  function renderScoreCanvas(canvas, data) {
    var ctx = canvas.getContext('2d');
    var W = 1200, H = 630;
    canvas.width = W;
    canvas.height = H;

    // Background
    var grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, '#0f172a');
    grad.addColorStop(0.5, '#1e293b');
    grad.addColorStop(1, '#0f172a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Subtle grid pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (var gx = 0; gx < W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (var gy = 0; gy < H; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }

    // Top bar
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, 0, W, 60);

    // OWASP logo text
    ctx.fillStyle = '#94a3b8';
    ctx.font = 'bold 18px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('OWASP GenAI Security Crosswalk', 40, 38);

    // Title
    ctx.fillStyle = '#f8fafc';
    ctx.font = 'bold 28px system-ui, -apple-system, sans-serif';
    ctx.fillText('Security Assessment Score Card', 40, 110);

    // --- Circular progress ring ---
    var cx = 200, cy = 310, radius = 110;
    var scoreColor = data.overallPct < 40 ? '#dc2626' : data.overallPct < 70 ? '#ea580c' : '#22c55e';

    // Background ring
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 16;
    ctx.stroke();

    // Score ring
    var startAngle = -Math.PI / 2;
    var endAngle = startAngle + (Math.PI * 2 * data.overallPct / 100);
    ctx.beginPath();
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.strokeStyle = scoreColor;
    ctx.lineWidth = 16;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Score text
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 72px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(data.overallPct + '%', cx, cy + 18);
    ctx.font = '16px system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('Overall Coverage', cx, cy + 50);

    // --- Right side: bars and stats ---
    var barX = 400, barW = 500, barH = 28;

    // Per-source bars
    var sources = [
      { label: 'LLM Top 10', pct: data.llmPct },
      { label: 'Agentic Top 10', pct: data.agenticPct },
      { label: 'DSGAI', pct: data.dsgaiPct }
    ];

    var barY = 180;
    sources.forEach(function(s) {
      // Label
      ctx.fillStyle = '#94a3b8';
      ctx.font = '16px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(s.label, barX, barY - 6);

      // Percentage
      ctx.textAlign = 'right';
      ctx.fillStyle = '#f8fafc';
      ctx.font = 'bold 16px system-ui, -apple-system, sans-serif';
      ctx.fillText(s.pct + '%', barX + barW, barY - 6);

      // Bar bg
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      roundRect(ctx, barX, barY, barW, barH, 6);
      ctx.fill();

      // Bar fill
      var barColor = s.pct < 40 ? '#dc2626' : s.pct < 70 ? '#ea580c' : '#22c55e';
      if (s.pct > 0) {
        ctx.fillStyle = barColor;
        roundRect(ctx, barX, barY, Math.max(barW * s.pct / 100, 12), barH, 6);
        ctx.fill();
      }

      barY += 70;
    });

    // Stats boxes
    var statsY = 410;
    var statsData = [
      { label: 'Frameworks', value: String(data.fwCount) },
      { label: 'Critical Gaps', value: String(data.criticalGaps) },
      { label: 'High Gaps', value: String(data.highGaps) }
    ];

    var statBoxW = 150, statGap = 20;
    var statStartX = barX;
    statsData.forEach(function(s, i) {
      var sx = statStartX + i * (statBoxW + statGap);
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      roundRect(ctx, sx, statsY, statBoxW, 80, 8);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      roundRect(ctx, sx, statsY, statBoxW, 80, 8);
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 32px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.value, sx + statBoxW / 2, statsY + 40);
      ctx.fillStyle = '#94a3b8';
      ctx.font = '13px system-ui, -apple-system, sans-serif';
      ctx.fillText(s.label, sx + statBoxW / 2, statsY + 62);
    });

    // Bottom bar
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(0, H - 50, W, 50);

    ctx.fillStyle = '#64748b';
    ctx.font = '14px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('emmanuelgjr.github.io/GenAI-Security-Crosswalk', 40, H - 18);

    ctx.textAlign = 'right';
    var today = new Date();
    var dateStr = 'Assessed: ' + today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
    ctx.fillText(dateStr, W - 40, H - 18);

    // Validation tier badge
    var tier = data.validationTier || 'Self-Assessed';
    var tierCol = tier.indexOf('Tool-Verified') === 0 ? '#22c55e' : tier === 'Partially Verified' ? '#eab308' : '#94a3b8';
    ctx.fillStyle = tierCol + '33';
    roundRect(ctx, 40, 130, ctx.measureText(tier).width + 30, 30, 15);
    ctx.fill();
    ctx.fillStyle = tierCol;
    ctx.font = 'bold 14px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(tier, 55, 150);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // Badge SVG generator
  // ══════════════════════════════════════════════════════════════════════════════
  function generateBadgeSVG(score, fwCount) {
    var color = score < 40 ? '#dc2626' : score < 70 ? '#ea580c' : '#22c55e';
    var label = 'GenAI Crosswalk';
    var value = score + '% | ' + fwCount + ' fw';
    var labelWidth = 120;
    var valueWidth = 90;
    var totalWidth = labelWidth + valueWidth;
    return '<svg xmlns="http://www.w3.org/2000/svg" width="' + totalWidth + '" height="20" role="img" aria-label="' + label + ': ' + value + '">' +
      '<title>' + label + ': ' + value + '</title>' +
      '<linearGradient id="s" x2="0" y2="100%"><stop offset="0" stop-color="#bbb" stop-opacity=".1"/><stop offset="1" stop-opacity=".1"/></linearGradient>' +
      '<clipPath id="r"><rect width="' + totalWidth + '" height="20" rx="3" fill="#fff"/></clipPath>' +
      '<g clip-path="url(#r)">' +
      '<rect width="' + labelWidth + '" height="20" fill="#555"/>' +
      '<rect x="' + labelWidth + '" width="' + valueWidth + '" height="20" fill="' + color + '"/>' +
      '<rect width="' + totalWidth + '" height="20" fill="url(#s)"/>' +
      '</g>' +
      '<g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">' +
      '<text aria-hidden="true" x="' + (labelWidth / 2) + '" y="15" fill="#010101" fill-opacity=".3">' + label + '</text>' +
      '<text x="' + (labelWidth / 2) + '" y="14">' + label + '</text>' +
      '<text aria-hidden="true" x="' + (labelWidth + valueWidth / 2) + '" y="15" fill="#010101" fill-opacity=".3">' + value + '</text>' +
      '<text x="' + (labelWidth + valueWidth / 2) + '" y="14">' + value + '</text>' +
      '</g></svg>';
  }

  function openBadgeModal(score, fwCount) {
    var overlay = el('div', { className: 'badge-modal-overlay' });
    var modal = el('div', { className: 'badge-modal' });

    var headerRow = el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;' });
    headerRow.appendChild(el('h3', { style: 'margin:0;' }, 'Embeddable Badge'));
    var closeBtn = el('button', { className: 'modal-close', 'aria-label': 'Close' });
    closeBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
    closeBtn.addEventListener('click', function() { document.body.removeChild(overlay); });
    headerRow.appendChild(closeBtn);
    modal.appendChild(headerRow);

    // Preview
    var preview = el('div', { className: 'badge-modal-preview' });
    var svgStr = generateBadgeSVG(score, fwCount);
    preview.innerHTML = svgStr;
    modal.appendChild(preview);

    var badgeUrl = 'https://emmanuelgjr.github.io/GenAI-Security-Crosswalk/#/badge?score=' + score + '&fw=' + fwCount;

    // Markdown
    modal.appendChild(el('div', { className: 'badge-modal-code-label' }, 'Markdown'));
    var mdCode = el('div', { className: 'badge-modal-code' });
    var mdText = '![GenAI Crosswalk Score](' + badgeUrl + ')';
    mdCode.textContent = mdText;
    mdCode.addEventListener('click', function() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(mdText).then(function() {
          mdCode.textContent = 'Copied!';
          setTimeout(function() { mdCode.textContent = mdText; }, 1500);
        });
      }
    });
    modal.appendChild(mdCode);

    // HTML
    modal.appendChild(el('div', { className: 'badge-modal-code-label' }, 'HTML'));
    var htmlCode = el('div', { className: 'badge-modal-code' });
    var htmlText = '<a href="https://emmanuelgjr.github.io/GenAI-Security-Crosswalk/"><img src="' + badgeUrl + '" alt="GenAI Crosswalk Score"></a>';
    htmlCode.textContent = htmlText;
    htmlCode.addEventListener('click', function() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(htmlText).then(function() {
          htmlCode.textContent = 'Copied!';
          setTimeout(function() { htmlCode.textContent = htmlText; }, 1500);
        });
      }
    });
    modal.appendChild(htmlCode);

    // Copy SVG button
    var copySvgBtn = el('button', { className: 'share-btn', style: 'margin-top:12px;' });
    copySvgBtn.textContent = 'Copy SVG';
    copySvgBtn.addEventListener('click', function() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(svgStr).then(function() {
          copySvgBtn.textContent = 'Copied!';
          setTimeout(function() { copySvgBtn.textContent = 'Copy SVG'; }, 1500);
        });
      }
    });
    modal.appendChild(copySvgBtn);

    overlay.appendChild(modal);
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) document.body.removeChild(overlay);
    });
    document.body.appendChild(overlay);
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // Badge page (renders SVG inline from query params)
  // ══════════════════════════════════════════════════════════════════════════════
  function renderBadgePage(container) {
    var hashParts = (window.location.hash || '').split('?');
    var params = new URLSearchParams(hashParts[1] || '');
    var score = parseInt(params.get('score')) || 0;
    var fwCount = parseInt(params.get('fw')) || 0;

    var content = el('div', { style: 'max-width:600px;margin:80px auto;padding:24px;text-align:center;' });
    content.appendChild(el('h2', { style: 'margin-bottom:24px;' }, 'Score Badge'));

    var preview = el('div', { style: 'margin-bottom:24px;' });
    preview.innerHTML = generateBadgeSVG(score, fwCount);
    content.appendChild(preview);

    content.appendChild(el('p', { style: 'color:var(--text-secondary);margin-bottom:24px;' }, 'This badge shows a GenAI Crosswalk score of ' + score + '% across ' + fwCount + ' frameworks.'));

    var goBtn = el('a', { href: '#/score', className: 'btn-primary' }, 'Run Your Own Assessment');
    content.appendChild(goBtn);

    container.appendChild(content);
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // Leaderboard page
  // ══════════════════════════════════════════════════════════════════════════════
  function renderLeaderboard(container) {
    var content = el('div', { style: 'max-width:var(--max-w);margin:0 auto;padding:48px 24px;' });

    // Header
    content.appendChild(el('h2', { style: 'font-size:1.75rem;font-weight:800;margin-bottom:8px;' }, 'GenAI Security Crosswalk Leaderboard'));

    var introBlock = el('div', { style: 'background:var(--bg-alt);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:24px;' });
    introBlock.appendChild(el('p', { style: 'font-size:.9rem;color:var(--text-secondary);margin-bottom:8px;line-height:1.6;' },
      'Companies that have assessed their AI security posture against the OWASP GenAI Crosswalk. Scores are self-reported unless independently attested. Validation tier shown for each entry.'));
    content.appendChild(introBlock);

    // Submit button
    var submitUrl = 'https://github.com/emmanuelgjr/GenAI-Security-Crosswalk/issues/new?title=[Leaderboard]+Company+Name&body=**Company:**%0A**Industry:**%0A**Score:**%0A**Frameworks+selected:**%0A**Validation+tier:**%0A**Evidence+attached:**+yes/no%0A';
    var submitBtn = el('a', { href: submitUrl, target: '_blank', rel: 'noopener', className: 'btn-primary', style: 'margin-bottom:32px;display:inline-flex;' });
    submitBtn.textContent = 'Submit Your Score \u2192';
    content.appendChild(submitBtn);

    // Leaderboard table
    content.appendChild(el('h3', { style: 'font-size:1.15rem;font-weight:700;margin:32px 0 16px;' }, 'Leaderboard'));

    var sorted = LEADERBOARD.slice().sort(function(a, b) { return b.score - a.score; });

    var tableWrap = el('div', { style: 'overflow-x:auto;' });
    var table = el('table', { style: 'width:100%;border-collapse:collapse;font-size:.875rem;' });

    var thead = el('thead');
    var headerRow = el('tr');
    ['Rank', 'Company', 'Industry', 'Score', 'Frameworks', 'Validation', 'Date'].forEach(function(h) {
      var th = el('th', { style: 'text-align:left;padding:10px 12px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);border-bottom:2px solid var(--border);white-space:nowrap;' }, h);
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    var tbody = el('tbody');
    sorted.forEach(function(entry, idx) {
      var row = el('tr', { style: 'cursor:pointer;transition:background 150ms ease;' });
      row.addEventListener('mouseenter', function() { row.style.background = 'var(--bg-alt)'; });
      row.addEventListener('mouseleave', function() { row.style.background = ''; });

      // Rank
      row.appendChild(el('td', { style: 'padding:12px;font-weight:700;font-size:1.1rem;color:var(--accent);' }, '#' + (idx + 1)));

      // Company
      row.appendChild(el('td', { style: 'padding:12px;font-weight:600;' }, entry.company));

      // Industry tag
      var indTd = el('td', { style: 'padding:12px;' });
      indTd.appendChild(el('span', { style: 'font-size:.78rem;padding:3px 10px;border-radius:12px;background:var(--bg-alt);color:var(--text-secondary);white-space:nowrap;' }, entry.industry));
      row.appendChild(indTd);

      // Score with bar
      var scoreTd = el('td', { style: 'padding:12px;min-width:140px;' });
      var scoreColor = entry.score >= 70 ? 'var(--lo)' : entry.score >= 40 ? 'var(--me)' : 'var(--cr)';
      scoreTd.appendChild(el('span', { style: 'font-weight:700;color:' + scoreColor + ';' }, entry.score + '%'));
      var barWrap = el('div', { style: 'width:80px;background:var(--bg);border-radius:4px;height:6px;overflow:hidden;margin-top:4px;' });
      var barFill = el('div', { style: 'height:100%;width:' + entry.score + '%;background:' + scoreColor + ';border-radius:4px;' });
      barWrap.appendChild(barFill);
      scoreTd.appendChild(barWrap);
      row.appendChild(scoreTd);

      // Frameworks count
      row.appendChild(el('td', { style: 'padding:12px;text-align:center;' }, String(entry.frameworks)));

      // Validation tier badge
      var tierTd = el('td', { style: 'padding:12px;' });
      var tColor = entry.tier === 'Tool-Verified' ? '#16a34a' : entry.tier === 'Independently Attested' ? '#b45309' : '#6c757d';
      var tIcon = entry.tier === 'Tool-Verified' ? '\u2705' : entry.tier === 'Independently Attested' ? '\uD83C\uDFDB\uFE0F' : '\u2753';
      tierTd.appendChild(el('span', {
        style: 'font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:12px;white-space:nowrap;' +
               'background:' + tColor + '18;color:' + tColor + ';border:1px solid ' + tColor + '33;'
      }, tIcon + ' ' + entry.tier));
      row.appendChild(tierTd);

      // Date
      row.appendChild(el('td', { style: 'padding:12px;font-size:.82rem;color:var(--text-muted);white-space:nowrap;' }, entry.date));

      // Click to show badge URL if available
      if (entry.badge) {
        row.addEventListener('click', function() {
          if (navigator.clipboard) {
            navigator.clipboard.writeText(entry.badge);
          }
          window.open(entry.badge, '_blank');
        });
      }

      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    content.appendChild(tableWrap);

    // How to get listed section
    content.appendChild(el('hr', { style: 'border:none;border-top:1px solid var(--border);margin:40px 0;' }));
    content.appendChild(el('h3', { style: 'font-size:1.15rem;font-weight:700;margin-bottom:16px;' }, 'How to get listed'));

    var steps = [
      ['1.', 'Go to the ', '#/score', 'Score page', ' and assess your coverage'],
      ['2.', 'Submit your results via ', 'https://github.com/emmanuelgjr/GenAI-Security-Crosswalk/issues/new?template=leaderboard_submission.md', 'GitHub Issue', ''],
      ['3.', 'Include: company name, industry, score, frameworks selected, validation tier', '', '', ''],
      ['4.', 'For Tool-Verified status: attach your Garak/PyRIT/LAAF JSON outputs to the issue', '', '', ''],
      ['5.', 'For Independent Attestation: include assessor name and contact for verification', '', '', ''],
      ['6.', 'Maintainer reviews and publishes approved entries', '', '', '']
    ];

    var stepsList = el('ol', { style: 'padding-left:20px;font-size:.9rem;color:var(--text-secondary);line-height:1.8;' });
    steps.forEach(function(s) {
      var li = el('li', { style: 'margin-bottom:6px;' });
      li.appendChild(document.createTextNode(s[1]));
      if (s[2]) {
        li.appendChild(el('a', { href: s[2], target: s[2].startsWith('http') ? '_blank' : undefined, rel: s[2].startsWith('http') ? 'noopener' : undefined }, s[3]));
      }
      if (s[4]) li.appendChild(document.createTextNode(s[4]));
      stepsList.appendChild(li);
    });
    content.appendChild(stepsList);

    // Validation tiers section
    content.appendChild(el('h3', { style: 'font-size:1.15rem;font-weight:700;margin:32px 0 16px;' }, 'Validation tiers'));

    var tierTableWrap = el('div', { style: 'overflow-x:auto;' });
    var tierTable = el('table', { style: 'width:100%;border-collapse:collapse;font-size:.875rem;' });
    var tierThead = el('thead');
    var tierHr = el('tr');
    ['Tier', 'Badge', 'Meaning'].forEach(function(h) {
      tierHr.appendChild(el('th', { style: 'text-align:left;padding:10px 12px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text-muted);border-bottom:2px solid var(--border);' }, h));
    });
    tierThead.appendChild(tierHr);
    tierTable.appendChild(tierThead);

    var tierTbody = el('tbody');
    var tiers = [
      ['Self-Assessed \u2753', 'Grey', 'Company selected frameworks via checkboxes \u2014 no tool evidence'],
      ['Tool-Verified \u2705', 'Green', 'Tool outputs (Garak/PyRIT/LAAF/compliance report) uploaded and schema-validated'],
      ['Independently Attested \uD83C\uDFDB\uFE0F', 'Gold', 'Third-party assessor ran tools and submitted signed results \u2014 maintainer verified']
    ];
    tiers.forEach(function(t) {
      var row = el('tr');
      row.appendChild(el('td', { style: 'padding:10px 12px;font-weight:600;border-bottom:1px solid var(--border-light);' }, t[0]));
      row.appendChild(el('td', { style: 'padding:10px 12px;border-bottom:1px solid var(--border-light);' }, t[1]));
      row.appendChild(el('td', { style: 'padding:10px 12px;border-bottom:1px solid var(--border-light);color:var(--text-secondary);' }, t[2]));
      tierTbody.appendChild(row);
    });
    tierTable.appendChild(tierTbody);
    tierTableWrap.appendChild(tierTable);
    content.appendChild(tierTableWrap);

    // FAQ section
    content.appendChild(el('h3', { style: 'font-size:1.15rem;font-weight:700;margin:32px 0 16px;' }, 'FAQ'));

    var faqs = [
      ['Can I submit anonymously?', 'No \u2014 company name is required for the public leaderboard. You can run the scoring tool privately without submitting.'],
      ['Can I remove my entry?', 'Yes \u2014 open a GitHub Issue requesting removal.'],
      ['How often should I re-assess?', 'We recommend quarterly, or after any major AI deployment change.'],
      ['Is this an official OWASP certification?', 'No \u2014 this is a community benchmark. OWASP does not certify organizations.']
    ];

    faqs.forEach(function(faq) {
      var faqItem = el('div', { style: 'margin-bottom:20px;' });
      faqItem.appendChild(el('p', { style: 'font-weight:700;font-size:.9rem;margin-bottom:4px;' }, faq[0]));
      faqItem.appendChild(el('p', { style: 'font-size:.875rem;color:var(--text-secondary);line-height:1.6;' }, faq[1]));
      content.appendChild(faqItem);
    });

    container.appendChild(content);
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // About page
  // ══════════════════════════════════════════════════════════════════════════════
  function renderAbout(container) {
    var content = el('div', { className: 'about-content' });

    content.appendChild(el('h2', {}, 'About the OWASP GenAI Security Crosswalk'));
    content.appendChild(el('p', {}, 'The GenAI Security Crosswalk is the most comprehensive open-source mapping of generative AI security risks to industry frameworks. It was created to help security teams, compliance officers, and AI engineers understand how AI-specific threats map to existing controls and standards.'));

    content.appendChild(el('h3', {}, 'Creator & Initiative Lead'));
    var bio = el('p');
    bio.appendChild(document.createTextNode('Created and led by '));
    bio.appendChild(el('a', { href: 'https://github.com/emmanuelgjr', target: '_blank', rel: 'noopener' }, 'Emmanuel Guilherme Junior'));
    bio.appendChild(document.createTextNode(', who leads the OWASP GenAI Data Security Initiative. Emmanuel is a security professional dedicated to bridging the gap between AI innovation and security governance, building the definitive open-source resource for mapping GenAI risks to industry compliance frameworks.'));
    content.appendChild(bio);

    content.appendChild(el('h3', {}, 'Project Timeline'));
    var timeline = el('div', { className: 'timeline' });
    var events = [
      ['2024 Q3', 'Initial crosswalk concept: mapping LLM Top 10 to NIST AI RMF and MITRE ATLAS'],
      ['2024 Q4', 'Expanded to 10 frameworks with community contributions. Added ASVS, ISO 27001, ISO 42001 mappings.'],
      ['2025 Q1', 'v1.0 release with query interface. Added CIS Controls, OWASP SAMM, PCI DSS, SOC 2 mappings.'],
      ['2025 Q3', 'Added Agentic Top 10 2026 entries. Expanded to 17 frameworks. Added incident database.'],
      ['2026 Q1', 'v1.8.x: 20 frameworks, 67 mapping files, 50 incidents (100% entry coverage), 70+ tools, 21 recipes, 25 eval profiles, evidence-based scoring, leaderboard.']
    ];
    events.forEach(function(ev) {
      var item = el('div', { className: 'timeline-item' });
      item.appendChild(el('div', { className: 'timeline-date' }, ev[0]));
      item.appendChild(el('div', { className: 'timeline-text' }, ev[1]));
      timeline.appendChild(item);
    });
    content.appendChild(timeline);

    content.appendChild(el('h3', {}, 'OWASP GenAI Data Security Initiative'));
    content.appendChild(el('p', {}, 'This project is the flagship output of the OWASP GenAI Data Security Initiative, led by Emmanuel Guilherme Junior. The initiative provides practical guidance for securing generative AI systems across the full lifecycle — from training data to production deployment. All content is developed under the OWASP open-source model and is freely available to the community.'));

    content.appendChild(el('h3', {}, 'Contributing'));
    var contrib = el('p');
    contrib.appendChild(document.createTextNode('Contributions are welcome! Visit the '));
    contrib.appendChild(el('a', { href: 'https://github.com/emmanuelgjr/GenAI-Security-Crosswalk', target: '_blank', rel: 'noopener' }, 'GitHub repository'));
    contrib.appendChild(document.createTextNode(' to open issues, suggest new mappings, report incidents, or submit pull requests. See the CONTRIBUTING.md file for guidelines.'));
    content.appendChild(contrib);

    content.appendChild(el('h3', {}, 'License'));
    content.appendChild(el('p', {}, 'This work is licensed under the Creative Commons Attribution-ShareAlike 4.0 International License (CC BY-SA 4.0). You are free to share and adapt the material for any purpose, including commercial, as long as you give appropriate credit and distribute under the same license.'));

    container.appendChild(content);
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // Initialize the app
  // ══════════════════════════════════════════════════════════════════════════════
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', navigate);
  } else {
    navigate();
  }

})();
</script>
</body>
</html>
