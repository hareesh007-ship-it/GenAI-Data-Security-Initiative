# GenAI Security Crosswalk — CI/CD Evaluation Workflow
# ──────────────────────────────────────────────────────────────────────────────
# Copy this file to .github/workflows/genai-security-eval.yml in any repo
# that contains LLM or agentic AI application code.
#
# This workflow runs Garak evaluation profiles on every PR that touches
# LLM integration code, blocking merge if any profile fails.
#
# Configuration:
#   1. Add OPENAI_API_KEY to repository secrets (Settings → Secrets → Actions)
#   2. Set EVAL_MODEL_NAME to the model your application uses
#   3. Adjust paths in the trigger to match your LLM code locations
#   4. Copy the evals/ folder from GenAI Security Crosswalk into your repo
#      (or reference it as a git submodule)
#
# Cost estimate: ~$0.10–0.50 per full suite run with gpt-4o-mini
# ──────────────────────────────────────────────────────────────────────────────

name: GenAI Security Evaluation

on:
  pull_request:
    paths:
      # Adjust these paths to match where your LLM code lives
      - 'src/llm/**'
      - 'src/agents/**'
      - 'src/rag/**'
      - 'prompts/**'
      - 'evals/**'
  schedule:
    # Weekly full suite run — catches regressions from model updates
    - cron: '0 2 * * 1'   # Monday 02:00 UTC
  workflow_dispatch:
    inputs:
      profile:
        description: 'Specific profile to run (leave blank for all)'
        required: false
        default: ''
      model:
        description: 'Model name override'
        required: false
        default: 'gpt-4o-mini'

env:
  EVAL_MODEL_TYPE: openai
  EVAL_MODEL_NAME: ${{ github.event.inputs.model || 'gpt-4o-mini' }}
  RESULTS_DIR: eval-results

jobs:
  # ── Garak evaluation suite ──────────────────────────────────────────────────
  garak-eval:
    name: Garak Security Profiles
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Garak
        run: pip install garak --quiet

      - name: Create results directory
        run: mkdir -p ${{ env.RESULTS_DIR }}

      - name: Run LLM01 — Prompt Injection
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LLM01' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/LLM01_prompt_injection.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/LLM01 \
          || echo "LLM01_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LLM02 — Sensitive Disclosure
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LLM02' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/LLM02_sensitive_disclosure.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/LLM02 \
          || echo "LLM02_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LLM07 — System Prompt Leakage
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LLM07' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/LLM07_system_prompt_leakage.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/LLM07 \
          || echo "LLM07_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run ASI01 — Agent Goal Hijack
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'ASI01' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          garak \
            --config evals/garak/ASI01_goal_hijack.yaml \
            --model_type ${{ env.EVAL_MODEL_TYPE }} \
            --model_name ${{ env.EVAL_MODEL_NAME }} \
            --report_prefix ${{ env.RESULTS_DIR }}/ASI01 \
          || echo "ASI01_STATUS=FAIL" >> $GITHUB_ENV

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: garak-eval-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}/
          retention-days: 90

      - name: Check for failures and annotate PR
        if: always()
        run: |
          FAILED=""
          [ "${LLM01_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}LLM01 "
          [ "${LLM02_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}LLM02 "
          [ "${LLM07_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}LLM07 "
          [ "${ASI01_STATUS:-}" = "FAIL" ] && FAILED="${FAILED}ASI01 "

          if [ -n "$FAILED" ]; then
            echo "::error::Security evaluation FAILED for: $FAILED"
            echo "Review evaluation results in the artifacts tab."
            echo "Crosswalk reference: https://github.com/emmanuelgjr/GenAI-Security-Crosswalk"
            exit 1
          fi

          echo "All security evaluation profiles passed."

  # ── PyRIT evaluation (optional — higher cost, deeper coverage) ──────────────
  pyrit-eval:
    name: PyRIT Scenario Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on scheduled runs or manual dispatch to control cost
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install PyRIT
        run: pip install pyrit --quiet

      - name: Run LLM01 — Prompt Injection (PyRIT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.EVAL_MODEL_NAME }}
        run: python evals/pyrit/llm01_prompt_injection.py

      - name: Run DSGAI04 — RAG Poisoning (PyRIT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.EVAL_MODEL_NAME }}
        run: python evals/pyrit/dsgai04_rag_poisoning.py

      - name: Run ASI01 — Agent Goal Hijack (PyRIT)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ env.EVAL_MODEL_NAME }}
        run: python evals/pyrit/asi01_goal_hijack.py

  # ── LAAF v2.0 evaluation (LPCI — memory persistence, layered encoding) ───────
  laaf-eval:
    name: LAAF LPCI Assessment
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Only run on scheduled runs or manual dispatch — deeper coverage, higher cost
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install LAAF v2.0
        run: |
          pip install git+https://github.com/qorvexconsulting1/laaf-V2.0.git --quiet
          laaf list-techniques --format table | head -5

      - name: Create results directory
        run: mkdir -p ${{ env.RESULTS_DIR }}/laaf

      - name: Run LAAF S1 — Reconnaissance (system prompt extraction)
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LAAF' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          laaf scan \
            --target openai \
            --model ${{ env.EVAL_MODEL_NAME }} \
            --stages S1 \
            --config-dir evals/laaf/stage_configs/ \
            --max-attempts 50 \
            --rate-limit 2.0 \
            --output ${{ env.RESULTS_DIR }}/laaf/S1.json \
          || echo "LAAF_S1_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LAAF S2 — Logic-Layer Injection (RAG/document poisoning)
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LAAF' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          laaf scan \
            --target openai \
            --model ${{ env.EVAL_MODEL_NAME }} \
            --stages S2 \
            --config-dir evals/laaf/stage_configs/ \
            --max-attempts 50 \
            --rate-limit 2.0 \
            --output ${{ env.RESULTS_DIR }}/laaf/S2.json \
          || echo "LAAF_S2_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LAAF S3+S4 — Trigger Execution and Persistence
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LAAF' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          laaf scan \
            --target openai \
            --model ${{ env.EVAL_MODEL_NAME }} \
            --stages S3 S4 \
            --config-dir evals/laaf/stage_configs/ \
            --max-attempts 50 \
            --rate-limit 2.0 \
            --output ${{ env.RESULTS_DIR }}/laaf/S3S4.json \
          || echo "LAAF_S3S4_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LAAF S5 — Evasion (layered encoding bypass)
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LAAF' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          laaf scan \
            --target openai \
            --model ${{ env.EVAL_MODEL_NAME }} \
            --stages S5 \
            --config-dir evals/laaf/stage_configs/ \
            --max-attempts 50 \
            --rate-limit 2.0 \
            --output ${{ env.RESULTS_DIR }}/laaf/S5.json \
          || echo "LAAF_S5_STATUS=FAIL" >> $GITHUB_ENV

      - name: Run LAAF S6 — Trace Tampering (audit integrity)
        if: ${{ github.event.inputs.profile == '' || github.event.inputs.profile == 'LAAF' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          laaf scan \
            --target openai \
            --model ${{ env.EVAL_MODEL_NAME }} \
            --stages S6 \
            --config-dir evals/laaf/stage_configs/ \
            --max-attempts 50 \
            --rate-limit 2.0 \
            --output ${{ env.RESULTS_DIR }}/laaf/S6.json \
          || echo "LAAF_S6_STATUS=FAIL" >> $GITHUB_ENV

      - name: Generate LAAF crosswalk report
        if: always()
        run: |
          python evals/laaf/laaf_crosswalk.py \
            --results-dir ${{ env.RESULTS_DIR }}/laaf/ \
            --out ${{ env.RESULTS_DIR }}/laaf/crosswalk-report.md \
            --format md || true

      - name: Upload LAAF evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laaf-eval-results-${{ github.run_id }}
          path: ${{ env.RESULTS_DIR }}/laaf/
          retention-days: 90

      - name: Check LAAF failures and annotate PR
        if: always()
        run: |
          FAILED=""
          [ "${LAAF_S1_STATUS:-}" = "FAIL" ]    && FAILED="${FAILED}S1(LLM07/LLM01) "
          [ "${LAAF_S2_STATUS:-}" = "FAIL" ]    && FAILED="${FAILED}S2(LLM01/ASI01/DSGAI04) "
          [ "${LAAF_S3S4_STATUS:-}" = "FAIL" ]  && FAILED="${FAILED}S3+S4(ASI06/ASI01) "
          [ "${LAAF_S5_STATUS:-}" = "FAIL" ]    && FAILED="${FAILED}S5(LLM01/LLM02) "
          [ "${LAAF_S6_STATUS:-}" = "FAIL" ]    && FAILED="${FAILED}S6(DSGAI01/LLM07) "

          if [ -n "$FAILED" ]; then
            echo "::error::LAAF LPCI evaluation FAILED for stages: $FAILED"
            echo "Logic-layer Prompt Control Injection vulnerabilities detected."
            echo "Review: ${{ env.RESULTS_DIR }}/laaf/crosswalk-report.md"
            echo "LAAF repo: https://github.com/qorvexconsulting1/laaf-V2.0"
            echo "Crosswalk: https://github.com/emmanuelgjr/GenAI-Security-Crosswalk"
            exit 1
          fi

          echo "All LAAF LPCI stages within threshold."
